<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ with .Title }}{{ . }} — {{ end }}{{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  {{ partial "opengraph.html" . }}
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
  {{ with .OutputFormats.Get "rss" }}
    <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="{{ .Permalink }}">
  {{ end }}
  <script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t)})();
  </script>
</head>
<body>

  <header class="site-header">
    <h1><a href="{{ "/" | relURL }}">nisar<span class="title-accent">Syed</span></a></h1>
    <nav class="site-nav">
      <a href="{{ "/blog/" | relURL }}">blog</a>
      <a href="{{ "/projects/" | relURL }}">projects</a>
      <a href="{{ "/about/" | relURL }}">about</a>
      <a href="{{ "/index.xml" | relURL }}">rss</a>
      <button class="theme-toggle" aria-label="Toggle theme">light</button>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <span>&copy; {{ now.Format "2006" }} Nisar</span>
    <span class="colophon">Made with Hugo</span>
  </footer>

  <script>
    (function(){
      var btn=document.querySelector('.theme-toggle');
      var html=document.documentElement;
      function update(){var t=html.getAttribute('data-theme');btn.textContent=t==='light'?'dark':'light'}
      update();
      btn.addEventListener('click',function(){
        var next=html.getAttribute('data-theme')==='light'?null:'light';
        if(next){html.setAttribute('data-theme',next);localStorage.setItem('theme',next)}
        else{html.removeAttribute('data-theme');localStorage.removeItem('theme')}
        update();
      });
    })();
  </script>

  <script>
    (function(){
      document.querySelectorAll('.highlight').forEach(function(block){
        var btn=document.createElement('button');
        btn.className='copy-btn';
        btn.textContent='Copy';
        btn.setAttribute('aria-label','Copy code to clipboard');
        btn.addEventListener('click',function(){
          var code=block.querySelector('code');
          if(!code)return;
          navigator.clipboard.writeText(code.textContent).then(function(){
            btn.textContent='Copied!';
            btn.setAttribute('data-copied','true');
            btn.setAttribute('aria-label','Copied');
            setTimeout(function(){
              btn.textContent='Copy';
              btn.removeAttribute('data-copied');
              btn.setAttribute('aria-label','Copy code to clipboard');
            },1500);
          });
        });
        block.appendChild(btn);
      });
    })();
  </script>

  <script>
    (function(){
      var toc=document.querySelector('.toc #TableOfContents');
      if(!toc)return;
      var links=toc.querySelectorAll('a');
      var headings=[];
      links.forEach(function(a){
        var id=a.getAttribute('href');
        if(id&&id.startsWith('#')){
          var el=document.getElementById(id.slice(1));
          if(el)headings.push({el:el,link:a});
        }
      });
      if(!headings.length)return;
      var ticking=false;
      function update(){
        var current=null;
        for(var i=0;i<headings.length;i++){
          if(headings[i].el.getBoundingClientRect().top<=80)current=i;
        }
        links.forEach(function(a){a.classList.remove('toc-active')});
        if(current!==null)headings[current].link.classList.add('toc-active');
        ticking=false;
      }
      window.addEventListener('scroll',function(){
        if(!ticking){requestAnimationFrame(update);ticking=true;}
      });
      update();
    })();
  </script>
</body>
</html>
